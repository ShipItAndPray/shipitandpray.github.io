const gh = 'https://github.com/ShipItAndPray/';
const pages = 'https://shipitandpray.github.io/';

function render(filter) {
  const f = (filter || '').toLowerCase();
  const visible = f ? projects.filter(p => (p.name + p.desc + p.cat).toLowerCase().includes(f)) : projects;
  const cats = [...new Set(visible.map(p => p.cat))];
  const container = document.getElementById('projects');
  container.innerHTML = cats.map(cat => {
    const items = visible.filter(p => p.cat === cat);
    return '<div class="section"><div class="sec-title">' + cat + ' <span class="sec-count">' + items.length + '</span></div><div class="grid">' +
      items.map(p => {
        const demoUrl = p.demo || (pages + p.gh + '/');
        return '<a class="card" href="' + demoUrl + '" target="_blank"><div class="m ' + p.cls + '">' + p.cat + '</div><h3>' + p.name + '</h3><p>' + p.desc + '</p><div class="links"><a href="' + gh + p.gh + '">GitHub</a>' + (p.demo ? '<a href="' + p.demo + '">Live</a>' : '') + '</div></a>';
      }).join('') + '</div></div>';
  }).join('');
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
render();
</script>
